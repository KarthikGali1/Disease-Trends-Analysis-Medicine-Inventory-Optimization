version: 2

models:

  # DIMENSIONS

  - name: dim_patients
    description: "Dimension table containing patient demographics and registration details."
    columns:
      - name: patient_id
        description: "Unique identifier for each patient"
        tests: [not_null, unique]
      - name: patient_gender
        description: "Normalized gender values"
        tests:
          - accepted_values:
              values: ["Male", "Female", "Other"]

  - name: dim_diseases
    description: "Dimension table containing disease reference data."
    columns:
      - name: disease_id
        description: "Unique identifier for disease"
        tests: [not_null, unique]
      - name: disease_name
        description: "Cleaned disease name"

  - name: dim_hospitals
    description: "Dimension table containing hospital reference data."
    columns:
      - name: hospital_id
        description: "Unique identifier for hospital"
        tests: [not_null, unique]
      - name: hospital_name
        description: "Name of the hospital"

  - name: dim_geography
    description: "Dimension table containing geographic details at region/state/city level."
    columns:
      - name: region_id
        description: "Unique identifier for geographic region"
        tests: [not_null, unique]
      - name: state
        description: "State name"
      - name: city
        description: "City name"

  # FACTS

  - name: fact_patient_visits
    description: "Fact table for hospital visits, admissions, discharges, and outcomes."
    columns:
      - name: surveillance_id
        description: "Unique identifier for surveillance record"
        tests: [not_null, unique]
      - name: patient_id
        description: "Foreign key to dim_patients"
        tests:
          - relationships:
              to: ref('dim_patients')
              field: patient_id
      - name: hospital_id
        description: "Foreign key to dim_hospitals"
        tests:
          - relationships:
              to: ref('dim_hospitals')
              field: hospital_id
      - name: disease_id
        description: "Foreign key to dim_diseases"
        tests:
          - relationships:
              to: ref('dim_diseases')
              field: disease_id
      - name: region_id
        description: "Foreign key to dim_geography"
        tests:
          - relationships:
              to: ref('dim_geography')
              field: region_id

  - name: fact_prescriptions
    description: "Fact table for prescriptions enriched with patient, disease, and hospital context."
    columns:
      - name: prescription_id
        description: "Unique identifier for prescription"
        tests: [not_null, unique]
      - name: patient_id
        description: "Foreign key to dim_patients"
        tests:
          - relationships:
              to: ref('dim_patients')
              field: patient_id
      - name: disease_id
        description: "Foreign key to dim_diseases"
        tests:
          - relationships:
              to: ref('dim_diseases')
              field: disease_id
      - name: hospital_id
        description: "Foreign key to dim_hospitals"
        tests:
          - relationships:
              to: ref('dim_hospitals')
              field: hospital_id

  - name: fact_disease_trends
    description: "Aggregated fact table for disease case counts and trends over time."
    columns:
      - name: disease_id
        description: "Foreign key to dim_diseases"
        tests:
          - relationships:
              to: ref('dim_diseases')
              field: disease_id
      - name: region_id
        description: "Foreign key to dim_geography"
        tests:
          - relationships:
              to: ref('dim_geography')
              field: region_id
      - name: trend_date
        description: "Date of aggregation"
        tests: [not_null]
      - name: total_cases
        description: "Aggregated number of cases on trend_date"

  - name: fact_disease_surveillance
    description: "Fact table for real-time disease surveillance with daily trends and patient outcomes."
    columns:
      - name: surveillance_id
        description: "Unique identifier for surveillance record"
        tests: [not_null, unique]
      - name: date
        description: "Surveillance record date"
        tests: [not_null]
      - name: daily_cases
        description: "Total cases for that date"
      - name: daily_change_pct
        description: "Day-over-day percentage change in cases"
      - name: case_fatality_rate
        description: "Daily case fatality rate"
      - name: recovery_rate
        description: "Daily recovery rate"
      - name: avg_length_of_stay
        description: "Average length of hospital stay for patients"

  - name: fact_geographic_hotspots
    description: "Fact table for geographic hotspot detection with population-adjusted risk scoring."
    columns:
      - name: region_id
        description: "Foreign key to dim_geography"
        tests:
          - relationships:
              to: ref('dim_geography')
              field: region_id
      - name: total_cases
        description: "Total number of cases in region"
        tests: [not_null]
      - name: total_patients
        description: "Distinct patient count in region"
        tests: [not_null]
      - name: cases_per_1k_density
        description: "Cases per 1000 population density"
      - name: hotspot_risk_level
        description: "Risk classification: Normal/Warning/Critical"
