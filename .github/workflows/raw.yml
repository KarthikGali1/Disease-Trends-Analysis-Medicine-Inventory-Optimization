name: snowflake-devops-demo
# Controls when the action will run. 
on:
  push:
    branches:
      - main
    paths:
      - 'raw/**'
  pull_request:
    branches:
      - main
    paths:
      - 'raw/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-snowflake-changes-job:
    runs-on: ubuntu-latest
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Use Python 3.8.x
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
          
      - name: Install schemachange
        run: |
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          python --version
          echo "Step 1: Installing schemachange"
          pip install schemachange
          
      - name: Create connections.toml with proper escaping
        run: |
          cat > connections.toml << 'EOF'
          [connections.raw_connection]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WH }}"
          database = "RAW_DB_DEV"
          schema = "SCHEMACHANGE"
          EOF
          
          # Verify the file was created correctly (without exposing secrets)
          echo "connections.toml structure:"
          sed 's/= "[^"]*"/= "[REDACTED]"/g' connections.toml
      
      - name: Debug - Show actual file content
        run: |
          echo "Actual connections.toml content (with sensitive data masked):"
          sed 's/= ".*"/= "[REDACTED]"/' connections.toml
      
      - name: Deploy Raw Layer
        run: |
          echo "Step 2: Running schemachange"
          schemachange deploy \
            -c raw_connection \
            -f raw/ \
            --create-change-history-table
