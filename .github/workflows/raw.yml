name: Deploy Raw Layer
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install schemachange
        run: pip install schemachange
      
      - name: Debug - Check if secrets are available
        run: |
          echo "Checking if secrets are set (showing only length):"
          echo "SNOWFLAKE_ACCOUNT length: ${#SNOWFLAKE_ACCOUNT}"
          echo "SNOWFLAKE_USER length: ${#SNOWFLAKE_USER}"
          echo "SNOWFLAKE_PASSWORD length: ${#SNOWFLAKE_PASSWORD}"
          echo "SNOWFLAKE_ROLE length: ${#SNOWFLAKE_ROLE}"
          echo "SNOWFLAKE_WH length: ${#SNOWFLAKE_WH}"
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WH: ${{ secrets.SNOWFLAKE_WH }}
      
      - name: Create connections.toml with validation
        run: |
          # Validate that all required secrets are set
          if [ -z "$SNOWFLAKE_ACCOUNT" ]; then
            echo "ERROR: SNOWFLAKE_ACCOUNT secret is not set"
            exit 1
          fi
          if [ -z "$SNOWFLAKE_USER" ]; then
            echo "ERROR: SNOWFLAKE_USER secret is not set"
            exit 1
          fi
          if [ -z "$SNOWFLAKE_PASSWORD" ]; then
            echo "ERROR: SNOWFLAKE_PASSWORD secret is not set"
            exit 1
          fi
          if [ -z "$SNOWFLAKE_ROLE" ]; then
            echo "ERROR: SNOWFLAKE_ROLE secret is not set"
            exit 1
          fi
          if [ -z "$SNOWFLAKE_WH" ]; then
            echo "ERROR: SNOWFLAKE_WH secret is not set"
            exit 1
          fi
          
          # Create connections.toml
          cat > connections.toml << EOF
          [connections.raw_connection]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WH}"
          database = "RAW_DB_DEV"
          schema = "SCHEMACHANGE"
          EOF
          
          echo "connections.toml created successfully"
          echo "File contents (with password masked):"
          sed 's/password = .*/password = "***"/' connections.toml
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WH: ${{ secrets.SNOWFLAKE_WH }}
      
      - name: Deploy Raw Layer
        run: |
          schemachange deploy \
            -c raw_connection \
            -f raw/ \
            --create-change-history-table
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WH: ${{ secrets.SNOWFLAKE_WH }}
