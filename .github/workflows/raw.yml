name: Deploy Raw Layer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install schemachange
        run: pip install schemachange

      - name: Deploy Raw Layer
        run: |
          schemachange \
            -c raw_connection \
            -f raw/ \
            --create-change-history-table

