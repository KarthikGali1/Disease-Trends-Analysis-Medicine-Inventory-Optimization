name: Deploy Raw Layer
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install schemachange
        run: pip install schemachange
      
      - name: Create connections.toml with environment variable references
        run: |
          cat > connections.toml << 'EOF'
          [connections.raw_connection]
          account = { env = "SNOWFLAKE_ACCOUNT" }
          user = { env = "SNOWFLAKE_USER" }
          password = { env = "SNOWFLAKE_PASSWORD" }
          role = { env = "SNOWFLAKE_ROLE" }
          warehouse = { env = "SNOWFLAKE_WAREHOUSE" }
          database = "RAW_DB_DEV"
          schema = "SCHEMACHANGE"
          EOF
          
          echo "connections.toml created with environment variable references:"
          cat connections.toml
      
      - name: Deploy Raw Layer
        run: |
          schemachange deploy \
            -c raw_connection \
            -f raw/ \
            --create-change-history-table
        env:
          SF_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SF_USER: ${{ secrets.SNOWFLAKE_USER }}
          SF_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SF_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SF_WAREHOUSE: ${{ secrets.SNOWFLAKE_WH }}
