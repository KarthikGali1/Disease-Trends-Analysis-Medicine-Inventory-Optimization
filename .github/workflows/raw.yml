name: Deploy Raw Layer
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install schemachange
        run: pip install schemachange
      
      - name: Create connections.toml with proper escaping
        run: |
          cat > connections.toml << EOF
          [connections.raw_connection]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WH}"
          database = "RAW_DB_DEV"
          schema = "SCHEMACHANGE"
          EOF
          
          # Verify the file was created correctly (without exposing secrets)
          echo "connections.toml structure:"
          grep -v password connections.toml
          echo "password = [REDACTED]"
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WH: ${{ secrets.SNOWFLAKE_WH }}
      
      - name: Debug - Show actual file content
        run: |
          echo "Actual connections.toml content (with sensitive data masked):"
          sed 's/= ".*"/= "[REDACTED]"/' connections.toml
      
      - name: Deploy Raw Layer
        run: |
          schemachange deploy \
            -c raw_connection \
            -f raw/ \
            --create-change-history-table
