name: Deploy Snowflake Changes

on:
  push:
    branches:
      - KIPI-stone
    paths:
      - 'raw/**'
  pull_request:
    branches:
      - KIPI-stone
    paths:
      - 'raw/**'
  workflow_dispatch:

jobs:
  deploy-snowflake-changes-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install schemachange
        run: pip install schemachange

      - name: Debug if Snowflake secrets are set
        run: |
          test -n "$SNOWFLAKE_USER" && echo "SNOWFLAKE_USER is set" || echo "SNOWFLAKE_USER is NOT set"
          test -n "$SNOWFLAKE_ACCOUNT" && echo "SNOWFLAKE_ACCOUNT is set" || echo "SNOWFLAKE_ACCOUNT is NOT set"
          test -n "$SNOWFLAKE_ROLE" && echo "SNOWFLAKE_ROLE is set" || echo "SNOWFLAKE_ROLE is NOT set"
          test -n "$SNOWFLAKE_WAREHOUSE" && echo "SNOWFLAKE_WAREHOUSE is set" || echo "SNOWFLAKE_WAREHOUSE is NOT set"
          test -n "$SNOWFLAKE_DATABASE" && echo "SNOWFLAKE_DATABASE is set" || echo "SNOWFLAKE_DATABASE is NOT set"
        env:
          SNOWFLAKE_USER: ${{ secrets.SF_USERNAME }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SNOWFLAKE_ROLE: ${{ secrets.SF_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SF_DATABASE }}

      - name: Deploy Database Changes to Snowflake
        run: |
          echo "Running schemachange..."
          schemachange deploy \
            -f raw/ \
            -c $SNOWFLAKE_DATABASE.SCHEMACHANGE.CHANGE_HISTORY \
            --create-change-history-table \
            --verbose
        env:
          SNOWFLAKE_USER: ${{ secrets.SF_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SNOWFLAKE_ROLE: ${{ secrets.SF_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SF_DATABASE }}
