name: Deploy Raw Layer
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install schemachange
        run: pip install schemachange
      - name: Create connections.toml
        run: |
          cat > connections.toml << EOF
          [connections.raw_connection]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WH }}"
          database = "RAW_DB_DEV"
          schema = "SCHEMACHANGE"
          EOF
      - name: Deploy Raw Layer
        run: |
          schemachange deploy \
            -c raw_connection \
            -f raw/ \
            --create-change-history-table
