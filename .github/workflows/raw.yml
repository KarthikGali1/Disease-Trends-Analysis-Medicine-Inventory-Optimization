name: Deploy Snowflake Changes

# Controls when the action will run
on:
  push:
    branches:
      - KIPI-stone
    paths:
      - 'raw/**'
  pull_request:
    branches:
      - KIPI-stone
    paths:
      - 'raw/**'
  workflow_dispatch:

jobs:
  deploy-snowflake-changes-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install schemachange
        run: pip install schemachange

      - name: Deploy Database Changes to Snowflake
        # This 'env' block securely provides credentials to the schemachange command.
        # schemachange automatically detects and uses these standard environment variables.
        env:
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WH }}
          SNOWFLAKE_DATABASE: "RAW_DB_DEV"
          # The change history table will be created in the default schema (SCHEMACHANGE).
        run: |
          echo "Running schemachange..."
          schemachange deploy -f raw/ --create-change-history-table
