name: Deploy Raw Layer
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install schemachange
        run: pip install schemachange
      - name: Deploy Raw Layer
        run: |
          schemachange \
            --snowflake-account "${{ secrets.SNOWFLAKE_ACCOUNT }}" \
            --snowflake-user "${{ secrets.SNOWFLAKE_USER }}" \
            --snowflake-password "${{ secrets.SNOWFLAKE_PASSWORD }}" \
            --snowflake-role "${{ secrets.SNOWFLAKE_ROLE }}" \
            --snowflake-warehouse "${{ secrets.SNOWFLAKE_WH }}" \
            --snowflake-database "RAW_DB_DEV" \
            --snowflake-schema "SCHEMACHANGE" \
            -f raw/ \
            --create-change-history-table
