name: CI/CD Pipeline

on:
  push:
    branches: [ "KIPI-stone" ]
  pull_request:
    branches: [ "Amol" ]
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run unit tests
        run: npm test

  deploy:
    needs: build_and_test # This job depends on 'build_and_test'
    if: github.event_name == 'push' && github.ref == 'refs/heads/KIPI-stone'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging..."
          # Add your deployment commands here (e.g., rsync, AWS CLI, Azure CLI)
